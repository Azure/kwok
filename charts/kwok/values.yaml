image:
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image repository.
  repository: ghcr.io/azure/kwok/kwok
  # -- Overrides the image tag whose default is {{ .Chart.AppVersion }}.
  tag: "v0.8.0-alpha"

# -- Image pull secrets.
imagePullSecrets: []

# -- Override the `name` of the chart.
nameOverride: ""

# -- Override the `fullname` of the chart.
fullnameOverride: "kwok-controller"

podSecurityContext: {}
securityContext: {}

nodeSelector: {}
resources:
  requests:
    cpu: "30"
  limits:
    cpu: "30"
affinity: {}

# -- The replica count for Deployment.
replicas: 1

# -- Change `hostNetwork` to `true` if you want to deploy in a kind cluster.
hostNetwork: false
tolerations:
- operator: Exists
  effect: NoSchedule
  key: node-role.kubernetes.io/control-plane
- operator: Exists
  effect: NoSchedule
  key: node-role.kubernetes.io/master
volumes: []
env:
- name: POD_IP
  valueFrom:
    fieldRef:
      fieldPath: status.podIP
- name: HOST_IP
  valueFrom:
    fieldRef:
      fieldPath: status.hostIP
- name: GOMAXPROCS
  value: "30"

volumeMounts: []
enableDeployment: true
